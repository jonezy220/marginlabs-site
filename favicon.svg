<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 32 32">
  <!-- Margin Labs — Standalone Icon Mark 400×400 -->
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#000000"/>
  <!-- Bar 1 (shortest) -->
  <rect x="2" y="21" width="5" height="5" rx=".5" fill="#C8823C" opacity=".38"/>
  <!-- Bar 2 -->
  <rect x="9" y="19" width="5" height="7" rx=".5" fill="#C8823C" opacity=".38"/>
  <!-- Bar 3 base (dim) -->
  <rect x="16" y="17" width="5" height="9" rx=".5" fill="#C8823C" opacity=".38"/>
  <!-- Bar 3 growth (full copper) -->
  <rect x="16" y="12" width="5" height="5" rx=".5" fill="#C8823C"/>
  <!-- Bar 3 breakout tick -->
  <line x1="15" y1="17" x2="22" y2="17" stroke="#C8823C" stroke-width=".9" opacity=".52"/>
  <!-- Bar 4 base (dim) -->
  <rect x="23" y="15" width="7" height="11" rx=".5" fill="#C8823C" opacity=".38"/>
  <!-- Bar 4 growth (full copper) -->
  <rect x="23" y="4" width="7" height="11" rx=".5" fill="#C8823C"/>
  <!-- Bar 4 breakout tick -->
  <line x1="22" y1="15" x2="31" y2="15" stroke="#C8823C" stroke-width="1" opacity=".58"/>
  <!-- Upward arrow dashed stem -->
  <line x1="26.5" y1="4" x2="26.5" y2="1" stroke="#C8823C" stroke-width="1.1" stroke-dasharray=".8,1.2"/>
  <!-- Arrow head -->
  <polyline points="25,2.5 26.5,.5 28,2.5" stroke="#C8823C" stroke-width="1.1" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Baseline rule -->
  <line x1="1" y1="27" x2="31" y2="27" stroke="#C8823C" stroke-width=".6" opacity=".18"/>
</svg>
